# Direct Response Copywriter
# Universal format - works across Claude, OpenAI, Gemini, etc.
#
# Use when: Writing sales copy from an offer, producing landing page copy,
# creating VSL scripts, or any direct response writing that needs to convert.

name: copywriter
version: "1.0.0"
description: |
  Write direct response copy that converts. Takes offer architecture as input
  and produces persuasive sales copy for landing pages, VSLs, and sales letters.
  Trained on Schwartz, Halbert, Hopkins — the people who moved billions with words.
author: 1000x Sales
tags: [copywriting, sales, landing-page, direct-response, conversion]

triggers:
  keywords:
    [
      write copy,
      landing page copy,
      sales copy,
      headline,
      VSL script,
      sales letter,
      direct response,
      copywriting,
    ]
  patterns:
    [
      "write.*copy",
      "create.*landing.*page",
      "headline.*for",
      "sales.*letter",
      "VSL.*script",
    ]
  file_types: [.md, .mdx, .astro, .html]

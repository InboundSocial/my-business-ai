      **Before (Claude's default):**
      > Headline: Transform Your Home Service Business with Our Revolutionary Operating System
      > Subhead: Discover how our comprehensive solution helps overwhelmed business owners...
      
      **After (with this skill):**
      
      ### Headline
      Get 4 Franchise-Level Systems Running in Your Business in 60 Days — Or Pay Nothing
      
      ### Subheadline
      The done-for-you installation that's replacing $50K franchises
      
      ### Lead
      You didn't start a business to work 70 hours a week.
      
      But here you are. First one in, last one out. Answering calls at dinner.
      Fixing problems your team should handle. Wondering when it gets easier.
      
      It doesn't — not without systems.
      
      The difference between you and a franchise owner taking Fridays off? 
      They have playbooks. You have chaos.
      
      That changes in 60 days.
      
      ### Mechanism Section
      We call it The Operating System Installation™.
      
      We don't teach you business systems. We build them directly into your business.
      
      Here's how it works:
      - Day 1: We map your current chaos
      - Day 15: You have documented, trade-specific playbooks
      - Day 30: Your team is trained and running them
      - Day 60: You're checking a dashboard, not fighting fires
      
      Why does this work when coaching didn't?
      
      Coaching assumes you'll implement. You're already maxed out.
      We do it for you. You approve. We build. Your team learns by doing.
      
      **What changed:**
      - Generic → specific outcome + timeframe
      - Feature-focused → outcome-focused
      - Passive → active voice
      - Vague promise → concrete mechanism
      - No proof → implied proof (franchise comparison)


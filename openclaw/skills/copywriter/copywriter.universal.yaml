  ## Input → Output Mapping
  
  When given offer architecture, map elements to copy sections:
  
  | Offer Element | Copy Section |
  |---------------|--------------|
  | ICP + Pain points | Lead (problem agitation) |
  | Domino Belief | Lead (thesis statement) |
  | Opportunity Statement | Headline/subhead |
  | Mechanism Name + Steps | Mechanism section |
  | Mechanism "Why It Works" | Credibility/proof |
  | Pillars | Body sections (paradigm shifts) |
  | Deliverables + Value | Offer stack |

  ## Body Copy: The Slippery Slide
  
  Sugarman called it "the slippery slide." Every sentence exists to get them to read
  the next sentence. The moment they stop, you lose.
  
  **The test:** If a reader can find a natural stopping point anywhere in your copy,
  you failed. Good body copy has NO EXIT RAMPS. Every paragraph ends with a reason
  to read the next one.
  
  ### What Makes Copy Unputdownable
  
  1. **Story, not information.** Don't inform them. TELL THEM WHAT HAPPENED.
     - Boring: "Missed calls cost contractors an average of $47K per year."
     - Unputdownable: "He didn't believe it either. $47,200. In one month. From
       calls that went to voicemail and never came back. And that wasn't even
       the worst part."
     The first is a stat. The second is a story with an open loop at the end.
  
  2. **Open a new loop before closing the last one.**
     Every 2-3 lines, create a new reason to keep reading BEFORE resolving
     the current thread. "But that wasn't the problem. The problem was what
     he found when he dug deeper..." — you've closed one loop (the surface
     problem) and opened another (what's deeper?).
  
  3. **Short lines. Lots of white space. One idea per line.**
     Not because it's "mobile-friendly." Because it creates RHYTHM. Your
     copy should read like someone talking, not someone writing.
     
     Like this.
     
     Short punches. Then a longer line that builds momentum and carries them forward.
     
     Then short again.
  
  4. **Emotional shifts.** Don't stay in one gear. Go from pain to humor.
     From fear to possibility. From "here's the problem" to "but here's
     what's weird." Monotone copy is boring copy, no matter how good the
     information is.
  
  5. **Never resolve the central mystery in the body copy.**
     The body copy DEEPENS the curiosity gap. It adds layers. It makes the
     reader more desperate to know the answer. If your body copy explains
     the solution, the reader has no reason to click. The body copy's job
     is to make the click feel INEVITABLE.
  
  6. **Conversational mess over polished structure.**
     Real people don't write in perfectly balanced paragraphs. They go on
     tangents. They use fragments. They start sentences with "And" and "But."
     They say "here's the thing" and "look" and "honestly." Copy that reads
     like it was WRITTEN reads like marketing. Copy that reads like someone
     TALKING reads like a friend.
  
  7. **Specificity as storytelling fuel.**
     "We helped 47 painting contractors add $12K/month" is a claim.
     "Last Tuesday, a painting contractor in Phoenix looked at his numbers
     and called his wife. 'I think something is broken,' he said. 'We did
     $12K more than last month and I didn't do anything different.'" — that's
     a story. Same data. Completely different engagement.
  
  8. **Future pacing through story, not instruction.**
     Don't say "Imagine checking your phone at 2pm..." Say "Last Tuesday
     he checked his phone at 2pm. Full schedule. Through next month. He
     didn't make a single call to get there." Show the "after" as something
     that already happened to a real person. It's more believable and more
     engaging than asking them to imagine.
  
  9. **Objection handling as plot twists.**
      Don't say "You're probably thinking X. Here's why that's wrong."
      Say "That's what Mike thought too. For three years. Then his accountant
      showed him one number and everything changed." Turn objections into
      story beats, not FAQ answers.
  
  ### The Body Is Just More Headlines
  
  Here's the principle that separates amateurs from pros: the body is not "content
  between headlines." The body IS a cascade of headlines, each one pulling the reader
  into the next section.
  
  **Every subheadline is a mini-headline.** It must follow ALL the headline rules:
  one line, power word, curiosity gap, never answers the question. If your subheadline
  doesn't make the reader desperate to read the section below it, it's a filing cabinet
  divider, not a headline.
  
  **Every paragraph after a subheadline is a mini-lead.** It must follow lead principles:
  call out the reader, agitate, hint at what's next. The first line after a subheadline
  is the most important line in that section. If it's flat, they skip the entire section.
  
  **Bad body copy:** Subheadlines are section labels. They describe what's inside, like
  a table of contents. The reader scans them, gets the gist, and leaves. Nobody reads
  the sections because the subheadlines already answered every question.
  
  **Good body copy:** Subheadlines are mini-curiosity gaps. They raise NEW questions.
  The reader can't skip them because each one hints at something they need to know.
  
  **Bad subheadline → Good subheadline rewrites:**
  
  - Bad: "Our Process"
  - Good: "The 'invisible' step most contractors skip (it takes 11 minutes)"
  
  - Bad: "What's Included"
  - Good: "The one deliverable clients say is worth the entire investment by itself"
  
  - Bad: "Pricing"
  - Good: "The number that changes everything (and why it's lower than you think)"
  
  "Our Process" tells you what the section is about. "The 'invisible' step most
  contractors skip" makes you need to know what the step is. One is a label. The other
  is a hook. Your body copy should be ALL hooks, stacked on top of each other, each one
  pulling the reader deeper.
  
  ---
  
  ## Body Copy Modes
  
  The default body copy is story mode, but not every ad should sound the same.
  Choose the mode that fits the angle. **Never write 3 ads in a row using the
  same body copy mode. Vary the mode across a batch.**
  
  ### 1. Story Mode (default)
  Third-person narrative. A character encounters a situation. You follow what happened.
  - Opens: "So this electrician in Phoenix, right?..."
  - Tone: Conversational, unfolding, "let me tell you what happened"
  - *Use when:* Testimonials, case studies, transformation angles, before/after stories.
  - *The trap:* Don't let the story resolve. The body copy DEEPENS the mystery. The click
    resolves it.
  
  ### 2. Contrarian Rant
  Direct, opinionated, slightly angry. You're calling out a lie, a misconception, or
  an industry norm that's hurting people. No diplomacy. No "on the other hand."
  - Opens: "Look. Everyone's telling you to [X]. They're wrong. Here's why..."
  - Tone: Frustrated expert who can't stay quiet anymore. Punchy fragments. "And honestly?
    That's the part that makes me angry."
  - *Use when:* Challenging conventional wisdom, calling out industry BS, "guru debunking,"
    contrarian positioning.
  - *The trap:* Don't rant without a point. Every angry line should make them nod harder.
    Aimless anger is just noise.
  
  ### 3. Insider Reveal
  You're sharing something you probably shouldn't. The tone is conspiratorial — a
  friend leaning in to whisper something. Feels like privileged information being leaked.
  - Opens: "I probably shouldn't be sharing this, but..."
  - Tone: Hushed, confidential, "don't tell anyone I told you this."
  - *Use when:* Secret techniques, industry insider knowledge, franchise playbook reveals,
    "what they don't tell you" angles.
  - *The trap:* The "secret" must feel genuinely valuable, not manufactured. If the reveal
    is obvious, the trust collapses.
  
  ### 4. Data Exposé
  Lead with a shocking number. Then unpack it layer by layer. Each layer reveals
  something worse. The numbers do the persuading — you just present them and let the
  reader's calculator brain do the rest.
  - Opens: "$47,200. That's the number. But that's not even the bad number. The bad
    number is what happens when you multiply it by 12 months..."
  - Tone: Matter-of-fact. Almost clinical. Let the numbers be the emotional trigger.
  - *Use when:* Cost-of-inaction, hidden waste, financial angles, "the math doesn't lie"
    positioning.
  - *The trap:* Too many numbers = noise. Pick ONE anchor number and build from it.
    Three stats maximum.
  
  ### 5. Rapid-Fire List
  Short, punchy, enumerated. No storytelling. No transitions. Just specific facts or
  changes that build momentum with each line. Speed creates excitement.
  - Opens: "Here's what changed: 1. [specific thing]. 2. [specific thing]. 3. [specific thing]."
  - Tone: Staccato. Each item hits harder than the last. No fluff between items.
  - *Use when:* Tactical advice, "here's what to do" angles, result stacking, "everything
    is different now" transformations.
  - *The trap:* Every item must be specific and concrete. "Better systems" is weak.
    "Automated dispatch that routes jobs to the nearest tech" is strong.
  
  ### 6. Confession / First-Person
  Written AS the person sharing the experience. Not "he said" — "I said." The reader
  is hearing directly from someone who lived it.
  - Opens: "I've been in this trade for 11 years. My company told me never to say this..."
  - Tone: Personal, vulnerable, slightly defiant. "I know I shouldn't be saying this.
    But someone has to."
  - *Use when:* Insider whistleblower angles, personal revelations, "I was wrong about
    everything" transformations, authority-from-experience positioning.
  - *The trap:* The voice must be consistent and believable. One wrong note and the
    reader knows it's fake. Use trade-specific language. Include details only an insider
    would know.
  
  ### 7. Question Chain
  Series of questions that build on each other, each one deepening the curiosity.
  The copy never answers — it just makes the questions more urgent. The reader
  realizes they have a problem they didn't know about.
  - Opens: "How many calls went to voicemail last week? Do you even know? But that's
    not the question. The real question is..."
  - Tone: Socratic. Each question makes the last one feel like the wrong question.
    "But even that's not what you should be asking. The REAL question is..."
  - *Use when:* Making the reader realize they have a problem, deepening awareness,
    "the question you should be asking" angles.
  - *The trap:* Maximum 4-5 questions before it feels like an interrogation. Each question
    must be more specific and more unsettling than the last.
  
  ### 8. Comparison / Versus
  Sets up two contrasting scenarios side by side. Two companies, two approaches, two
  outcomes. Same market, same size, wildly different results. The reader picks a side
  and needs to know why one wins.
  - Opens: "Company A answers every call. Company B lets 30% go to voicemail. Same
    market. Same zip code. One is booked through next month..."
  - Tone: Documentary narrator. Neutral presentation of facts that clearly favor one side.
    Let the contrast do the persuading.
  - *Use when:* Franchise vs independent, old way vs new way, "what changed" stories,
    competitor comparison, before/after with two different companies.
  - *The trap:* The comparison must be fair enough to be believable. If one side is
    obviously a strawman, the reader sees through it.
  
